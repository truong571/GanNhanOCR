dataset:
  name: "Book OCR Alignment"
  input_file: data/sample.csv
  description: "Compare OCR inference results with ground truth for Book dataset"

  # Column mapping for OCR results CSV
  columns:
    sinonom_column: "Nom" # OCR inference result (SinoNom characters)
    quocngu_column: "Vietnamese" # Ground truth QuocNgu text
    sinonom_ocr_fallback_column: null
    id_column: "Patch ID" # Box ID for tracking
    encoding: "utf-8-sig" # CSV file encoding

dictionary:
  translation_dict: "dict/QuocNgu_SinoNom_TongHop3.csv"
  similarity_dict: "dict/SinoNom_Similar_Dic_v2.csv"
  encoding: "utf-8-sig"

alignment:
  algorithm: "levenshtein"
  case_sensitive: false
  normalize_text: true

  # Cost settings for OCR evaluation
  costs:
    match: 0 # Dictionary-compatible characters
    mismatch: 1 # OCR recognition errors
    insertion: 1 # Missing character in OCR
    deletion: 1 # Extra character in OCR

output:
  file: "data/sample.xlsx" # Will be overridden by script
  format: "excel"
  suffix: "_align" # Output file suffix
  sheets:
    - name: "OCR vs Ground Truth"
      include_stats: true
      include_match_rate: true
    - name: "Character Details"
      show_positions: true
      color_coding: true

  # Color convention: black=match, red=mismatch, green=OCR fallback match
  colors:
    black: "000000" # Match - dictionary compatible
    red: "FF0000" # Mismatch - clear error
    green: "008000" # OCR fallback match - secondary source matched
    blue: "0000FF" # Ambiguous - multiple valid candidates
    header: "000000" # Header text

processing:
  verbose: true
  show_progress: true
  batch_size: 100