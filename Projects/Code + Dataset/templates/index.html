<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Lookup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: auto;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            text-align: center;
            max-width: auto;
        }
        .character {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .unicode {
            font-size: 24px;
            color: #555;
            margin-bottom: 10px;
        }
        .image {
            margin-bottom: 10px;
            max-width: 100%;
            height: auto;
        }
        .form-container {
            text-align: center;
            margin-bottom: 20px;
        }
        form {
            display: inline-block;
            margin: 0 10px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 200px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <form action="/" method="post">
            <div style="display: flex; align-items: center; justify-content: center;">
            <div style="margin-right: 20px;">
                <label for="character">Enter Chinese Character:</label>
                <input type="text" id="character" name="character" value="{{ last_character }}">
                <button type="submit" name="submit" value="character">Lookup</button>
            </div>
            <div>
                <label for="unicode">Enter Unicode:</label>
                <input type="text" id="unicode" name="unicode" value="{{ last_unicode }}">
                <button type="submit" name="submit" value="unicode">Lookup</button>
            </div>
            </div>
        </form>
    </div>
    <div class="container">
        {% for character, unicode, image_url, org_image_url in data %}
        <div class="card">
            <div class="character" onclick="copyToClipboard('{{ character }}')">{{ character }}</div>
            <div class="unicode" onclick="copyToClipboard('{{ unicode }}')">{{ unicode }}</div>
            <img src="{{ image_url }}" alt="Character Image" class="image">
            <img src="{{ org_image_url }}" alt="Original Character Image" class="image">
        </div>
        {% endfor %}
    </div>
    <script>
        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            const popup = document.createElement('div');
            popup.textContent = 'Copied';
            popup.style.position = 'absolute';
            popup.style.backgroundColor = '#333';
            popup.style.color = '#fff';
            popup.style.padding = '5px 10px';
            popup.style.borderRadius = '5px';
            popup.style.zIndex = '1000';
            popup.style.top = (event.clientY + 10) + 'px';
            popup.style.left = (event.clientX + 10) + 'px';
            document.body.appendChild(popup);

            setTimeout(() => {
                document.body.removeChild(popup);
            }, 100);
        }
    </script>
</body>
</html>
