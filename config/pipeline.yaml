# GanNhanOCR Pipeline Configuration

books:
  - name: CacThanhTruyen2
    pdf: Data/CacThanhTruyen2.pdf
    reocr: false
  - name: CacThanhTruyen4
    pdf: Data/CacThanhTruyen4.pdf
    reocr: false
  - name: CacThanhTruyen11
    pdf: Data/CacThanhTruyen11.pdf
    reocr: false

paths:
  data_dir: Data/prepared
  output_dir: dataset
  dict_dir: Dict
  qn_to_nom_dict: Dict/QuocNgu_SinoNom_TongHop3.csv
  similar_dict: Dict/SinoNom_Similar_Dic_v2.csv
  font_path: FontDiffusion/fonts/NomNaTong-Regular.ttf
  fontdiffusion_ckpt: FontDiffusion/ckpt

step1:
  dpi: 300
  denoise: true
  crop_size: 64
  sauvola_k: 0.2
  sauvola_window: 25
  min_stroke: 2
  use_ocr_api: true

step2:
  deletion_cost_small: 0.3
  deletion_cost_medium: 0.6
  deletion_cost_normal: 1.2
  insertion_cost: 1.0

step3:
  use_dinov2: true
  dinov2_threshold: 0.75
  use_fontdiffusion: false

step4:
  min_samples_per_class: 3
  split_ratios: [0.8, 0.1, 0.1]
  seed: 42
