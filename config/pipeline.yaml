# GanNhanOCR Pipeline Configuration

books:
  - name: CacThanhTruyen2
    pdf: Data/CacThanhTruyen2.pdf
    reocr: false
  - name: CacThanhTruyen4
    pdf: Data/CacThanhTruyen4.pdf
    reocr: false
  - name: CacThanhTruyen11
    pdf: Data/CacThanhTruyen11.pdf
    reocr: false
  - name: SachThanhTruyen2
    pdf: Data/SachThanhTruyen2.pdf
    reocr: false
  - name: SachThanhTruyen4
    pdf: Data/SachThanhTruyen4.pdf
    reocr: false
  - name: SachThanhTruyen11
    pdf: Data/SachThanhTruyen11.pdf
    reocr: false

paths:
  data_dir: prepared
  output_dir: dataset
  dict_dir: Dict
  qn_to_nom_dict: Dict/QuocNgu_SinoNom_TongHop3.csv
  similar_dict: Dict/SinoNom_Similar_Dic_v2.csv
  font_path: font_diffusion/fonts/NomNaTong-Regular.ttf
  # Production weights from HF root (dzungpham/font-diffusion-weights). The
  # /FST/checkpoint_step_1500/ subfolder is an undertrained snapshot — never use it.
  # Both keys point at the same dir; phase1 is unused while use_fst=False in
  # core/ranking/fontdiffusion_gen.py but kept for forward compatibility.
  fontdiffusion_ckpt: font_diffusion/ckpt/PROD
  fontdiffusion_phase1_ckpt: font_diffusion/ckpt/PROD
  # Universal FontDiffusion cache produced by kaggle_diffusion/diffusion_run.ipynb
  # (~21k NomNaTong glyphs). Pulled once with `huggingface-cli download`.
  fd_cache_universal: prepared/_universal_fd_cache

step1:
  dpi: 300
  denoise: true
  crop_size: 64
  sauvola_k: 0.2
  sauvola_window: 25
  min_stroke: 2
  use_ocr_api: true

step2:
  deletion_cost_small: 0.3
  deletion_cost_medium: 0.6
  deletion_cost_normal: 1.2
  insertion_cost: 1.0
  # Expand each char bbox by this fraction of (w, h) on each side before cropping,
  # so the saved PNG captures the full glyph (descenders, top diacritics, side
  # radicals) even at the cost of a sliver of neighbour ink.
  crop_pad_frac: 0.18

step3:
  use_dinov2: true
  dinov2_model: dinov2_vitb14_reg   # Base + registers — best for fine-grained chu-Nom
  dinov2_threshold: 0.75            # cosine similarity threshold for matched=True
  classical_threshold: 0.55         # classical CV fallback (Hu+IoU+projection)
  use_fontdiffusion: true
  require_fontdiffusion: true       # if true: tier 3 ONLY uses fd_cache (no font-rendered fallback)

step4:
  min_samples_per_class: 1
